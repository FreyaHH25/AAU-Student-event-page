
    <!-- Event read more-->
    <div id="event_info" class="modal hidden">
        <div class="modal-box">
            <img id="modal-image" src="" alt="Event Image" class="modal-image">

            <div class="modal-title-bar">
                <h2 id="modal-title" class="modal-title">Event Title</h2>
            </div>

            <div class="modal-content">
                <div class="modal-left">
                    <div class="modal-tags" id="modal-tags-container">
                        <span class="modal-tags-list">Tags:</span>
                    </div>
                    <p class="modal-information">
                        <img src="images/icons/date.png" class="info-icons">
                        <span id="modal-date"></span>
                    </p>

                    <p class="modal-information">
                        <img src="images/icons/time.png" class="info-icons">
                        <span id="modal-time"></span>
                    </p>

                    <p class="modal-information">
                        <img src="images/icons/location.png" class="info-icons">
                        <span id="modal-location"></span>
                    </p>

                    <p class="modal-information">
                        <img src="images/icons/organizer.png" class="info-icons">
                        <span id="modal-organizer"></span>
                    </p>

                    <div class="modal-description-box">
                        <p id="modal-description"></p>
                    </div>
                </div>

                <div class="modal-right">
                    <p class="modal-attending-header"><span id="modal-attendees">0</span> Attending students</p>
                    <ul class="modal-list" id="modal-list">
                    </ul>
                </div>
            </div>

            <div class="modal-buttons">
                <button class="modal-button-edit hidden-btn" id="edit-button">Edit</button>
                <button class="modal-button-delete hidden-btn" id="delete-button">Delete</button>
                <button class="modal-buttoon-attending" id="attend-button">Attend event</button>
                <button class="modal-button-close" id="modal-close-button">Close</button>
            </div>
        </div>
    </div>
